<!DOCTYPE html>
<html>
  <head>
    <title>Testing</title>
  </head>
  <body>
    <button class ='js-auto'>click</button>
    <script>
     const button = document.querySelector('.js-auto');

     const sacrificial = () => {
      console.log('Button was clicked!');
     };

     button.addEventListener('click', sacrificial);

     button.addEventListener('click', () => {
      console.log('Another click handler!');
     });

     // Trigger the button when Enter is pressed anywhere
     document.addEventListener('keydown', (event) => {
       if (event.key === 'Enter') {
         button.click();
       }
     });

     // Note: don't remove the listener immediately unless desired
     // button.removeEventListener('click', sacrificial);
    </script>
  </body>
</html>
