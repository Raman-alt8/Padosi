<!DOCTYPE html> 
 <html>

  <head>

    <title>Rock Paper Scissors </title>
   
  </head>

 <body>

  <p>Rock Paper Scissors Game</p>

  <button onclick="playGame('rock')">Rock</button>
  <button onclick="playGame('paper')">Paper</button>
  <button onclick="playGame('scissors')">Scissors</button>
  <button onclick="resetScore()">Reset Score</button>
  <button class="js-auto" onclick="autoPlay(); ">Auto play</button>
  <p class="js-result"></p>
  <p class="js-moves"></p>
  <p class="js-score"></p>

  <script> 

let score = {
  win: 0,
  lose: 0,
  tie: 0
};

try {
  const storedScore = window.localStorage && localStorage.getItem('score');
  if (storedScore) {
    score = JSON.parse(storedScore);
  }
} catch (error) {
  console.warn('Local storage unavailable or invalid score data:', error);
}

function updateScoreDisplay() {
  document.querySelector('.js-score').innerHTML = `Wins: ${score.win}, Losses: ${score.lose}, Ties: ${score.tie}`;
}

updateScoreDisplay();

let isAutoPlaying = false;
let autoPlayIntervalId;

function autoPlay() {
  if (!isAutoPlaying) {
    isAutoPlaying = true;
    autoPlayIntervalId = setInterval(function() {
      const playerMove = pickComputerMove();
      playGame(playerMove);
    }, 1000); 
  }
  else {
    isAutoPlaying = false;
    clearInterval(autoPlayIntervalId);
  }
}

function playGame(playerMove) {
  const computerMove = pickComputerMove();
  let result = '';

  if (playerMove === 'scissors') {
    if (computerMove === 'rock') {
      result = 'You lose!';
    } else if (computerMove === 'paper') {
      result = 'You win!';
    } else {
      result = 'It\'s a tie!';
    }

  } else if (playerMove === 'paper') {
    if (computerMove === 'rock') {
      result = 'You win!';
    } else if (computerMove === 'paper') {
      result = 'It\'s a tie!';
    } else {
      result = 'You lose!';
    }

  } else if (playerMove === 'rock') {
    if (computerMove === 'rock') {
      result = 'It\'s a tie!';
    } else if (computerMove === 'paper') {
      result = 'You lose!';
    } else {
      result = 'You win!';
    }
  }
  if (result === 'You win!') {
    score.win += 1;
  } else if (result === 'You lose!') {
    score.lose += 1;
  } else {
    score.tie += 1;
  }

  localStorage.setItem('score', JSON.stringify(score));

  updateScoreDisplay();

  document.querySelector('.js-result').innerHTML = 
  result;
  
  document.querySelector('.js-moves').innerHTML = 
  `Your pick ${playerMove} - Computer picked ${computerMove}.`;

  
}

function pickComputerMove() {
  const randomnumber = Math.random();
  let computerMove = '';
  
  if (randomnumber < 1/3) {
    computerMove = 'rock';
  } else if (randomnumber < 2/3) {
    computerMove = 'paper';
  } else {
    computerMove = 'scissors';
  }

  return computerMove;
}

function resetScore() {
  score.win = 0;
  score.lose = 0;
  score.tie = 0;
  localStorage.removeItem('score');
  updateScoreDisplay();
  console.log('Score reset');
}
</script> 

  
    
   

  
 </body>
</html>
