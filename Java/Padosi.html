<!DOCTYPE html>
<html>
<head>
  <title>Padosi</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700;800&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', sans-serif;
    }

    body {
      background: #f6f7fb;
      color: #111;
    }

    /* NAVBAR */
    .navBar {
      height: 70px;
      display: flex;
      justify-content: center;
      position: sticky;
      top: 0;
      z-index: 1000;
      background: white;
      border-bottom: 1px solid #eee;
    }

    .nav-container {
      width: 100%;
      max-width: 1200px;
      padding: 0 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      background-image: url("LOGO.png");
      height: 60px; /* slightly bigger */
      width: 170px;
      background-size: contain;
      background-repeat: no-repeat;
    }

    .nav-links {
      display: flex;
      gap: 18px;
      font-size: 14px;
      align-items: center;
    }

    .nav-links a {
      text-decoration: none;
      color: #111;
      transition: 0.2s;
    }

    .nav-links a:hover {
      color: #ff2d55;
    }

    .btn.black {
      padding: 8px 14px;
      border-radius: 20px;
      background: #111;
      color: white;
      border: none;
      cursor: pointer;
      transition: 0.2s;
    }

    .btn.black:hover {
      transform: translateY(-2px);
    }

    /* HERO */
    .hero {
      max-width: 1200px;
      margin: 40px auto;
      padding: 50px;
      background: white;
      border-radius: 20px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.06);
    }

    .hero-content {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 50px;
      flex-wrap: wrap;
    }

    .left { flex: 1; }
    .right { flex: 1; display: flex; justify-content: center; }

    .padosi {
      font-size: clamp(32px, 5vw, 56px);
      font-weight: 700;
      line-height: 1.1;
    }

    .padosi span {
      color: #ff2d55;
      font-size: clamp(40px, 6vw, 64px);
    }

    .schedule-toggle {
      margin-top: 20px;
      display: inline-flex;
      background: #f3f3f3;
      border-radius: 30px;
      padding: 4px;
    }

    .schedule-toggle button {
      border: none;
      background: transparent;
      padding: 10px 16px;
      border-radius: 25px;
      cursor: pointer;
    }

    .schedule-toggle .active {
      background: white;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    .input-card {
      margin-top: 20px;
      padding: 20px;
      border-radius: 16px;
      background: #fafafa;
    }

    .task-inputs {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .task-inputs input {
      padding: 14px;
      border-radius: 12px;
      border: 1px solid #ddd;
      width: 250px;
    }

    .enter-btn {
      margin-top: 12px;
      padding: 14px 28px;
      border-radius: 12px;
      border: none;
      background: #ff2d55;
      color: white;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
    }

    .enter-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(0,0,0,0.15);
    }

    /* MOCKUP */
    .mockup {
      width: 280px;
      background: white;
      border-radius: 20px;
      padding: 16px;
      box-shadow: 0 15px 40px rgba(0,0,0,0.1);
    }

    .task {
      background: #f4f4f4;
      padding: 10px;
      border-radius: 10px;
      margin-bottom: 10px;
    }

    /* VERIFIED */
    .verified-section {
      margin: 60px auto;
      max-width: 1100px;
      background: linear-gradient(135deg, #ff2d55, #ff6b81);
      border-radius: 20px;
      padding: 40px;
      color: white;
    }

    .verified-container {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 40px;
      flex-wrap: wrap;
    }

    .verified-image img {
      width: 200px;
    }

    .verified-text h2 {
      font-size: clamp(24px, 3vw, 32px);
      margin-bottom: 10px;
    }

    .verified-text p {
      margin-bottom: 20px; /* FIXED spacing */
    }

    .verified-btn {
      padding: 12px 24px;
      background: white;
      color: #ff2d55;
      border: none;
      border-radius: 10px;
      cursor: pointer;
    }

    /* HOW IT WORKS */
    .how-it-works {
      padding: 60px 20px;
      text-align: center;
      background: #ffffff;
  border-top: 2px solid #f0f0f0;
    }

    .how-it-works h2 {
      margin-bottom: 40px;
    }

    .steps {
      display: flex;
      justify-content: center;
      gap: 40px;
      flex-wrap: wrap;
    }

    .step {
      max-width: 250px;
    }

    .step img {
      width: 80px;
      margin-bottom: 20px; /* FIXED spacing */
    }

    .step h3 {
      margin-bottom: 8px;
    }

  </style>
</head>

<body>

<div class="navBar">
  <div class="nav-container">
    <div class="logo"></div>
    <div class="nav-links">
      <a href="#">About</a>
      <a href="#">Help</a>
      <a href="#">Log in</a>
      <button class="btn black">Sign up</button>
    </div>
  </div>
</div>

<div class="hero">
  <div class="hero-content">

    <div class="left">
      <div class="padosi">
        Get help nearby with <br>
        <span>Padosi</span>
      </div>

      <div class="schedule-toggle">
        <button class="active">Call now</button>
        <button>Schedule later</button>
      </div>

      <div class="input-card">
        <div class="task-inputs">
          <input type="text" placeholder="What do you need help with?">
          <input type="text" placeholder="Your budget (₹)">
        </div>
        <button class="enter-btn">Find Help</button>
      </div>
    </div>

    <div class="right">
      <div class="mockup">
        <div class="task">Fix fan - ₹300</div>
        <div class="task">Move furniture - ₹500</div>
        <div class="task">Install bulb - ₹150</div>
      </div>
    </div>

  </div>
</div>

<div class="verified-section">
  <div class="verified-container">
    <div class="verified-text">
      <h2>Become a Verified Member</h2>
      <p>Earn money by helping people nearby.</p>
      <button class="verified-btn">Get Verified</button>
    </div>
    <div class="verified-image">
      <img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png">
    </div>
  </div>
</div>

<div class="how-it-works">
  <h2>How Padosi works</h2>

  <div class="steps">
    <div class="step">
      <img src="https://cdn-icons-png.flaticon.com/512/1828/1828919.png">
      <h3>Post your task</h3>
    </div>

    <div class="step">
      <img src="https://cdn-icons-png.flaticon.com/512/942/942748.png">
      <h3>Get responses</h3>
    </div>

    <div class="step">
      <img src="https://cdn-icons-png.flaticon.com/512/190/190411.png">
      <h3>Get it done</h3>
    </div>
  </div>
</div>
<script src="scripts/scriptforPadosi.js"></script>

</body>
</html>
