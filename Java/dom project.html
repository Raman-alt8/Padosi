<!DOCTYPE html>
<html>
<head>
  <style>
    .button-subscribe {
      background-color: rgb(0, 0, 0);
      color: white;
      border: none;
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
      border-radius:40px;
    }
  .subscribed-after {
    background-color: rgb(219, 215, 215);
    color: black;
  }
  </style>
    <title>DOM project</title>
</head>
<body>
<p>Youtube Subscribe Button</p>
<button class="js-button button-subscribe" onclick="Subscribe()"
>Subscribe</button>

  <script>
function Subscribe() {
const buttonElement = document.querySelector('.js-button');
if (buttonElement.innerText === 'Subscribe') {
  buttonElement.innerText = 'Subscribed';
  buttonElement.classList.add('subscribed-after');
} else {
  buttonElement.innerText = 'Subscribe';
  buttonElement.classList.remove('subscribed-after');
}

}

  </script>
  </body>
</html>
