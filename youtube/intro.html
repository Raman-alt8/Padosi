<!DOCTYPE html>
<html>

  <head>

    <title>Youtube clone</title>
      <style>
        .preview{
          display: inline-block;
          width: 300px;
          vertical-align: top;
          margin-right: 15px;
         
        }
        .thumbnail{
          width: 300px;

      

        }
        .search{
          display: block;
          
        }
        .title{
        
        }
        .channel{
          display: block;
        }
          
          
        .metadata{
          display: block;
        }
      

      </style>

  </head>


  <body>

    <input class="search" type="text" placeholder="Search">

<div class="preview">
    <img class="thumbnail" src="Thumbnails/thumbnail-1.webp"> 
    <p class="title">Talking Tech and AI with Google CEO Sundar Pichai! </p>
    <p class="channel">Marques Brownlee</p>
    <p class="metadata">3.4M views &#183; 6 months ago</p>
</div>

<div class="preview">
    <img class="thumbnail" src="Thumbnails/thumbnail-2.webp"> 
    <p class="title">Try Not To Laugh Challenge #9 </p>
    <p class="channel">Markiplier</p>
    <p class="metadata">19M views &#183; 4 years ago</p>
</div>



  </body>

</html>
